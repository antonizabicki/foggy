    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030303;
            --text-main: #f0f0f0;
            --marathon-yellow: #feed01; 
            --font-display: 'Syncopate', sans-serif;
            --font-tech: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-tech);
            text-transform: uppercase;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: ""; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2; pointer-events: none;
        }

        body::after {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            z-index: 999; background-size: 100% 4px;
            pointer-events: none; opacity: 0.6;
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(254, 237, 1, 0.05) 0%, transparent 60%);
            z-index: -1; pointer-events: none;
        }

        .store-logo { width: 100%; max-width: 700px; margin-bottom: 30px; padding: 0 20px; }
        .store-logo svg { width: 100%; height: auto; fill: var(--marathon-yellow); filter: drop-shadow(0 0 10px rgba(254, 237, 1, 0.3)); display: block; }
        
        .coming-soon { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 4rem); color: #fff; margin-bottom: 50px; text-align: center; letter-spacing: 2px; }
        
        .back-btn { 
            padding: 15px 40px; border: 1px solid #333; color: var(--text-main); 
            text-decoration: none; font-size: 1.1rem; transition: all 0.3s; 
            background: transparent; z-index: 10; cursor: pointer;
        }
        .back-btn:hover { border-color: var(--marathon-yellow); background: var(--marathon-yellow); color: #000; font-weight: bold; }

        /* Crosshairs dla estetyki */
        .crosshair { position: absolute; width: 15px; height: 15px; }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--marathon-yellow); }
        .crosshair::after { content: ''; position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: var(--marathon-yellow); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="crosshair" style="top: 20px; left: 20px;"></div>
    <div class="crosshair" style="top: 20px; right: 20px;"></div>

    <h1 class="coming-soon matrix-text" data-value="COMING SOON">COMING SOON</h1>
    
    <a href="index.html" class="back-btn">WRÓĆ</a>

    <script>
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        document.querySelectorAll('.matrix-text').forEach(el => {
            el.addEventListener('mouseenter', e => {
                let iterations = 0;
                const originalText = e.target.dataset.value;
                clearInterval(e.target.matrixInterval);
                
                e.target.matrixInterval = setInterval(() => {
                    e.target.innerText = originalText.split('')
                        .map((letter, index) => {
                            if(index < iterations) return originalText[index];
                            if(originalText[index] === ' ') return ' ';
                            return matrixChars[Math.floor(Math.random() * matrixChars.length)];
                        }).join('');
                    
                    if(iterations >= originalText.length) {
                        clearInterval(e.target.matrixInterval);
                        e.target.innerText = originalText;
                    }
                    iterations += 0.5;
                }, 30);
            });
        });
    </script>
